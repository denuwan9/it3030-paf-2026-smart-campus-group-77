spring.application.name=smart-campus-hub
server.port=8080

# ─── PostgreSQL / Supabase ───────────────────────────────────
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres
# For Supabase Pooler (port 5432/6543), username MUST be: postgres.[YOUR-PROJECT-REF]
spring.datasource.username=postgres.mgpnpwvvxjhglarsowbr
spring.datasource.password=hd97no2gfgMj3JZJ
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Use 'update' during development, switch to 'validate' before prod
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

