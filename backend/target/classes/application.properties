# ──────────────────────────────────────────────────────────────
#  Smart Campus Hub — application.properties
#  Fill in the values marked with <<...>> before running.
# ──────────────────────────────────────────────────────────────

spring.application.name=smart-campus-hub
server.port=8080

# ─── PostgreSQL / Supabase ───────────────────────────────────
spring.datasource.url=jdbc:postgresql://<<SUPABASE_HOST>>:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=<<SUPABASE_DB_PASSWORD>>
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Use 'update' during development, switch to 'validate' before prod
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── JWT ─────────────────────────────────────────────────────
# Minimum 32-byte Base64-encoded secret (HS256)
app.jwt.secret=<<YOUR_BASE64_ENCODED_SECRET_AT_LEAST_32_BYTES>>
# Token validity in milliseconds (default: 24 hours)
app.jwt.expiration-ms=86400000

# ─── SMTP / Mail (Mailtrap for dev, replace for prod) ────────
spring.mail.host=smtp.mailtrap.io
spring.mail.port=587
spring.mail.username=<<MAILTRAP_USERNAME>>
spring.mail.password=<<MAILTRAP_PASSWORD>>
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=noreply@smartcampus.lk

# ─── OAuth2 / Google ─────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=<<GOOGLE_CLIENT_ID>>
spring.security.oauth2.client.registration.google.client-secret=<<GOOGLE_CLIENT_SECRET>>
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ─── Frontend URL (used in OAuth2 redirects) ─────────────────
app.frontend.url=http://localhost:5173

# ─── Actuator ────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info

# ─── CORS ────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173
