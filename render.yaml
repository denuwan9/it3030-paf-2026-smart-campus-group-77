services:
  # Backend Service (Spring Boot)
  - type: web
    name: smart-campus-backend
    env: java
    rootDir: backend
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: PORT
        value: 8080
      - key: FRONTEND_URL
        fromService:
          name: smart-campus-frontend
          type: web
          property: url
      # The following should be set in the Render Dashboard for security:
      # - DATABASE_URL
      # - DATABASE_USERNAME
      # - DATABASE_PASSWORD
      # - CLOUDINARY_CLOUD_NAME
      # - CLOUDINARY_API_KEY
      # - CLOUDINARY_API_SECRET

  # Frontend Service (React/Vite)
  - type: web
    name: smart-campus-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: smart-campus-backend
          type: web
          property: url
