services:
  # Backend Service (Spring Boot via Docker)
  - type: web
    name: smart-campus-backend
    env: docker
    rootDir: backend
    # Plan is omitted to allow manual selection of "Free" in the UI
    envVars:
      - key: PORT
        value: 8080
      - key: FRONTEND_URL
        value: http://localhost:5173

  # Frontend Service (Static Site)
  - type: web
    name: smart-campus-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: http://localhost:8080
