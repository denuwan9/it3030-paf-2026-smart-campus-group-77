services:
  # Backend Service (Spring Boot via Docker)
  - type: web
    name: smart-campus-backend
    env: docker
    rootDir: backend
    envVars:
      - key: PORT
        value: 8080
      - key: FRONTEND_URL
        value: http://localhost:5173

  # Frontend Service (React/Vite as a Web Service)
  - type: web
    name: smart-campus-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    # Uses 'serve' to host the static files in a Node environment
    startCommand: npx serve -s dist
    envVars:
      - key: VITE_API_URL
        value: http://localhost:8080
