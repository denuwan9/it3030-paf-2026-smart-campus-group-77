services:
  # Backend Service (Spring Boot via Docker)
  - type: web
    name: smart-campus-backend
    env: docker
    rootDir: backend
    plan: free  # Free tier for Web Services
    envVars:
      - key: PORT
        value: 8080
      - key: FRONTEND_URL
        value: http://localhost:5173

  # Frontend Service (Static Site - Always Free)
  - type: static_site
    name: smart-campus-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: http://localhost:8080
